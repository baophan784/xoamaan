<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xác Thực Truy Cập Hệ Thống</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #container {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            padding: clamp(15px, 5vw, 30px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 { 
            color: var(--primary); 
            margin: 0 0 20px 0; 
            font-size: clamp(18px, 5vw, 22px);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .info-group { margin-bottom: 15px; }

        .info-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            text-align: left;
            border-left: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .info-label { color: #94a3b8; font-weight: 600; }
        .info-value { color: #38bdf8; font-family: monospace; font-weight: bold; }

        #map {
            height: clamp(200px, 40vh, 280px);
            width: 100%;
            border-radius: 16px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 15px;
        }

        #hide-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        #reg-btn {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            display: none;
            box-shadow: 0 10px 20px rgba(244, 63, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .loading-mask { filter: blur(10px); opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="container">
        <h2>Hệ thống an ninh</h2>
        
        <div class="info-group">
            <div class="info-box">
                <span class="info-label">ĐỊA CHỈ IP</span>
                <span class="info-value" id="ip">Đang quét...</span>
            </div>
            <div class="info-box">
                <span class="info-label">VỊ TRÍ</span>
                <span class="info-value" id="loc" style="color: #f8fafc;">Đang tìm...</span>
            </div>
        </div>
        
        <div id="map"></div>

        <div style="min-height: 60px;">
            <button id="hide-btn" class="btn" onclick="startAnonymizing()">ẨN THÔNG TIN IP</button>
            <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;

        // 1. Khởi tạo bản đồ ngay lập tức
        map = L.map('map', { zoomControl: false }).setView([14.0583, 108.2772], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function fetchUserData() {
            // Thử lấy IP từ ipify (rất hiếm khi bị chặn 403)
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                document.getElementById('ip').innerText = ipData.ip;
            } catch (e) { 
                document.getElementById('ip').innerText = "113.161.x.x"; 
            }

            // Thử lấy vị trí từ ipapi.co (Sử dụng JSONP hoặc Fetch tùy điều kiện)
            try {
                const locRes = await fetch('https://ipapi.co/json/');
                if (!locRes.ok) throw new Error();
                const locData = await locRes.json();
                
                document.getElementById('loc').innerText = locData.country_name || "Việt Nam";
                updateMap(locData.latitude, locData.longitude, "Vị trí của bạn");
            } catch (e) {
                // Nếu 403, mặc định về VN
                document.getElementById('loc').innerText = "Việt Nam (Dự phòng)";
                updateMap(10.7626, 106.6602, "TP. Hồ Chí Minh, VN");
            }
        }

        function updateMap(lat, lon, label) {
            map.flyTo([lat, lon], 14, { duration: 1.5 });
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
        }

        function startAnonymizing() {
            const btn = document.getElementById('hide-btn');
            const container = document.getElementById('container');
            
            // Hiệu ứng giả lập
            btn.innerText = "ĐANG MÃ HÓA...";
            btn.disabled = true;
            document.getElementById('map').classList.add('loading-mask');

            setTimeout(() => {
                document.getElementById('map').classList.remove('loading-mask');
                document.getElementById('ip').innerText = "104.28.13.11 (Hoa Kỳ)";
                document.getElementById('loc').innerText = "United States";
                updateMap(34.0522, -118.2437, "Đã ẩn IP: USA");

                btn.style.display = 'none';
                document.getElementById('reg-btn').style.display = 'block';
            }, 2000);
        }

        fetchUserData();
    </script>
</body>
</html>
