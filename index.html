<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Xác Thực Truy Cập</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #f43f5e;
            --bg: #0b1120;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #container {
            background: var(--card);
            width: 100%;
            max-width: 500px; /* Độ rộng tối đa trên máy tính */
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            text-align: center;
            position: relative;
            transition: transform 0.3s ease;
        }

        /* Tối ưu cho màn hình nhỏ (Điện thoại) */
        @media (max-width: 480px) {
            #container { padding: 15px; border-radius: 15px; }
            h2 { font-size: 18px; }
            .info-box { font-size: 13px; padding: 10px; }
            #map { height: 200px; } /* Giảm chiều cao bản đồ trên điện thoại */
            .btn { padding: 14px; font-size: 14px; }
        }

        h2 { color: var(--primary); margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }

        .info-box {
            background: #0f172a;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 4px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label { color: #94a3b8; font-weight: 600; font-size: 0.85em; }
        .info-value { color: #fb7185; font-family: 'Courier New', monospace; font-weight: bold; }

        #map {
            height: 280px;
            width: 100%;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #334155;
            z-index: 1;
        }

        .button-group { min-height: 60px; margin-top: 10px; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.2s ease;
            text-align: center;
        }

        #hide-btn { background: var(--primary); color: #0f172a; }
        #hide-btn:active { transform: scale(0.98); }

        #reg-btn {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Hiệu ứng mờ khi đang xử lý */
        .loading { filter: blur(8px); opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="container">
        <h2>Xác thực truy cập</h2>
        
        <div class="info-box">
            <span class="info-label">IP HIỆN TẠI</span>
            <span class="info-value" id="ip">...</span>
        </div>
        <div class="info-box">
            <span class="info-label">VỊ TRÍ</span>
            <span class="info-value" id="loc" style="color: #cbd5e1;">Đang lấy...</span>
        </div>
        
        <div id="map"></div>

        <div class="button-group">
            <button id="hide-btn" class="btn" onclick="startProcess()">ẨN THÔNG TIN IP</button>
            <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;

        // Khởi tạo bản đồ
        map = L.map('map', { zoomControl: false }).setView([16.0, 108.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function init() {
            try {
                const res = await fetch('https://ipwho.is/');
                const data = await res.json();
                if(data.success) {
                    document.getElementById('ip').innerText = data.ip;
                    document.getElementById('loc').innerText = data.country;
                    updateMap(data.latitude, data.longitude, "Vị trí thực tế");
                }
            } catch (e) {
                document.getElementById('ip').innerText = "113.161.x.x";
                document.getElementById('loc').innerText = "Việt Nam";
                updateMap(10.762, 106.660, "Vị trí dự phòng");
            }
        }

        function updateMap(lat, lon, label) {
            map.flyTo([lat, lon], 14, { duration: 2 });
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
        }

        function startProcess() {
            const btn = document.getElementById('hide-btn');
            const mapEl = document.getElementById('map');
            
            mapEl.classList.add('loading');
            btn.innerText = "ĐANG BẢO MẬT...";
            btn.disabled = true;

            setTimeout(() => {
                mapEl.classList.remove('loading');
                document.getElementById('ip').innerText = "104.28.13.11 (Hoa Kỳ)";
                document.getElementById('loc').innerText = "United States";
                updateMap(34.0522, -118.2437, "Vị trí bảo mật (USA)");

                btn.style.display = 'none';
                document.getElementById('reg-btn').style.display = 'block';
            }, 2000);
        }

        init();
    </script>
</body>
</html>
