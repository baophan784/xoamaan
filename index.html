<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xác Thực Truy Cập</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #f43f5e;
            --bg: #0b0f19;
            --card: #161b22;
            --text: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #container {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #30363d;
            position: relative;
            transition: all 0.5s ease;
        }

        h2 { color: var(--primary); margin-top: 0; font-size: 22px; letter-spacing: 1px; }

        .info-box {
            background: #0d1117;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 14px;
            border-left: 4px solid var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .info-label { color: #8b949e; font-weight: bold; }
        .info-value { color: #ff7b72; font-family: monospace; }

        #map {
            height: 250px;
            width: 100%;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px solid #30363d;
            background: #0d1117;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            box-sizing: border-box;
        }

        #hide-btn {
            background: var(--primary);
            color: #0b0f19;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
        }

        #hide-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5); }

        #reg-btn {
            background: linear-gradient(90deg, #f43f5e, #fb7185);
            color: white;
            display: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }

        /* Hiệu ứng mờ ảo khi chuyển đổi */
        .transitioning {
            filter: blur(5px) grayscale(1);
            pointer-events: none;
            transform: scale(0.95);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: var(--primary);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            display: none;
            animation: scan 1s linear infinite;
        }

        @keyframes scan {
            from { top: 0%; }
            to { top: 100%; }
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="scanline" id="scanner"></div>
        <h2>AN NINH HỆ THỐNG</h2>
        
        <div class="info-box">
            <span class="info-label">ĐỊA CHỈ IP:</span>
            <span class="info-value" id="ip">Đang quét...</span>
        </div>
        <div class="info-box">
            <span class="info-label">QUỐC GIA:</span>
            <span class="info-value" id="loc" style="color: #c9d1d9;">Xác định...</span>
        </div>
        
        <div id="map"></div>

        <div style="min-height: 55px;">
            <button id="hide-btn" class="btn" onclick="startAnonymize()">ẨN THÔNG TIN IP</button>
            <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;

        // Khởi tạo bản đồ mặc định tại Việt Nam (Dạng tối)
        map = L.map('map', { zoomControl: false }).setView([16.047, 108.206], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function initData() {
            try {
                // SỬ DỤNG HTTPS API ĐỂ CHẠY ĐƯỢC TRÊN VERCEL
                const response = await fetch('https://ipwho.is/');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('ip').innerText = data.ip;
                    document.getElementById('loc').innerText = data.country;
                    updateMap(data.latitude, data.longitude, "Vị trí thực tế");
                } else {
                    throw new Error();
                }
            } catch (e) {
                // Dự phòng nếu API bị chặn
                document.getElementById('ip').innerText = "113.161.x.x";
                document.getElementById('loc').innerText = "Việt Nam";
                updateMap(10.762, 106.660, "Vị trí dự phòng (VN)");
            }
        }

        function updateMap(lat, lon, popupText) {
            map.flyTo([lat, lon], 14, { duration: 2 });
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map).bindPopup(popupText).openPopup();
        }

        function startAnonymize() {
            const container = document.getElementById('container');
            const scanner = document.getElementById('scanner');
            const hideBtn = document.getElementById('hide-btn');
            
            // Bật hiệu ứng quét và mờ
            scanner.style.display = 'block';
            container.classList.add('transitioning');
            hideBtn.innerText = "ĐANG MÃ HÓA...";

            setTimeout(() => {
                // Kết thúc hiệu ứng
                container.classList.remove('transitioning');
                scanner.style.display = 'none';
                
                // Đổi thông tin sang Mỹ
                document.getElementById('ip').innerText = "104.28.13.11 (Mỹ)";
                document.getElementById('loc').innerText = "United States";
                updateMap(34.0522, -118.2437, "Vị trí bảo mật: USA");

                // Đổi nút bấm
                hideBtn.style.display = 'none';
                document.getElementById('reg-btn').style.display = 'block';
            }, 2500);
        }

        initData();
    </script>
</body>
</html>
