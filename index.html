<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xác Thực Kết Nối</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px;
        }

        #container { 
            background: var(--card); 
            width: 100%; 
            max-width: 400px; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: center;
        }

        h2 { color: var(--primary); margin-bottom: 20px; font-size: 18px; text-transform: uppercase; }

        .info-box { 
            background: rgba(0,0,0,0.3); 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px;
            border-left: 3px solid var(--primary);
        }

        .info-label { color: #94a3b8; }
        .info-value { color: #38bdf8; font-family: monospace; font-weight: bold; }

        /* Quan trọng: Chiều cao bản đồ phải cố định */
        #map { 
            height: 200px; 
            width: 100%; 
            border-radius: 12px; 
            margin: 15px 0; 
            background: #111; /* Màu nền chờ bản đồ load */
        }

        .btn { 
            display: block; width: 100%; padding: 16px; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; text-decoration: none; font-size: 15px;
            transition: 0.3s;
        }

        #hide-btn { background: var(--primary); color: white; }
        #reg-btn { 
            background: linear-gradient(90deg, #f43f5e, #e11d48); 
            color: white; display: none; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="container">
        <h2>Kiểm tra an ninh</h2>
        <div class="info-box"><span class="info-label">IP:</span> <span class="info-value" id="ip">Đang quét...</span></div>
        <div class="info-box"><span class="info-label">VỊ TRÍ:</span> <span class="info-value" id="loc">Đang tìm...</span></div>
        
        <div id="map"></div>

        <div style="min-height: 55px;">
            <button id="hide-btn" class="btn" onclick="fakeUSA()">ẨN THÔNG TIN IP</button>
            <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;

        function init() {
            try {
                // Khởi tạo bản đồ
                map = L.map('map', { zoomControl: false }).setView([10.7626, 106.6602], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                // Cập nhật lại kích thước để tránh lỗi xám bản đồ
                setTimeout(() => { map.invalidateSize(); }, 300);

                loadData();
            } catch (err) {
                console.error("Lỗi bản đồ:", err);
                document.getElementById('map').innerHTML = "<p style='padding-top:80px'>Không thể tải bản đồ</p>";
            }
        }

        async function loadData() {
            // Lấy IP từ Cloudflare
            try {
                const res = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
                const text = await res.text();
                const ip = text.match(/ip=(.*)\n/)[1];
                document.getElementById('ip').innerText = ip;
            } catch (e) { document.getElementById('ip').innerText = "113.172.x.x"; }

            // Lấy vị trí (Ưu tiên IP API cho nhanh và không hỏi quyền)
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('loc').innerText = data.city + ", " + data.country_code;
                updateMarker(data.latitude, data.longitude, "Vị trí của bạn");
            } catch (e) {
                document.getElementById('loc').innerText = "Việt Nam";
            }
        }

        function updateMarker(lat, lon, text) {
            if (marker) map.removeLayer(marker);
            map.flyTo([lat, lon], 14);
            marker = L.marker([lat, lon]).addTo(map).bindPopup(text).openPopup();
        }

        function fakeUSA() {
            const hBtn = document.getElementById('hide-btn');
            const rBtn = document.getElementById('reg-btn');
            
            hBtn.innerText = "ĐANG MÃ HÓA...";
            hBtn.classList.add('loading');

            setTimeout(() => {
                document.getElementById('ip').innerText = "104.28.13.11 (USA)";
                document.getElementById('loc').innerText = "Los Angeles, US";
                updateMarker(34.0522, -118.2437, "Proxy bảo mật");
                
                hBtn.style.display = 'none';
                rBtn.style.display = 'block';
            }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
