<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Phân Tích Truy Cập</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00f2ff; --bg: #050a14; --card: #101827; --accent: #ff7b72; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--bg); color: #e5e7eb; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 10px;
        }

        #container { 
            background: var(--card); width: 100%; max-width: 500px; 
            padding: 20px; border-radius: 15px; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.2);
            position: relative;
        }

        .header { text-align: center; border-bottom: 1px solid #1f2937; margin-bottom: 15px; padding-bottom: 10px; }
        .header h2 { color: var(--primary); margin: 0; font-size: 1.1rem; letter-spacing: 2px; }

        /* Lưới thông tin đa cột */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .info-item { background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 6px; border: 1px solid #1f2937; }
        .label { display: block; font-size: 9px; color: #6b7280; text-transform: uppercase; margin-bottom: 2px; }
        .value { display: block; font-size: 12px; color: var(--primary); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #map { height: 200px; width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid #1f2937; filter: hue-rotate(180deg) invert(90%) contrast(150%); }

        .btn-box { min-height: 55px; }
        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; 
            transition: 0.3s; font-size: 14px; text-decoration: none; display: block; text-align: center;
        }

        #hide-btn { background: var(--primary); color: #050a14; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        #reg-btn { 
            background: linear-gradient(90deg, #ff0055, #ff8800); color: white; 
            display: none; animation: pulse 1.5s infinite; 
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.5);
        }

        @keyframes pulse { 0% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.8; transform: scale(1); } }
        .loading { filter: blur(10px) brightness(0.3); pointer-events: none; }
    </style>
</head>
<body>

<div id="container">
    <div class="header">
        <h2>TERMINAL ACCESS: GRANTED</h2>
    </div>
    
    <div class="grid-container">
        <div class="info-item"><span class="label">Địa chỉ IP</span><span class="value" id="ip">...</span></div>
        <div class="info-item"><span class="label">Nhà mạng (ISP)</span><span class="value" id="isp">Scanning...</span></div>
        <div class="info-item"><span class="label">Thành phố</span><span class="value" id="city">...</span></div>
        <div class="info-item"><span class="label">Quốc gia</span><span class="value" id="country">...</span></div>
        
        <div class="info-item"><span class="label">Hệ điều hành</span><span class="value" id="os">...</span></div>
        <div class="info-item"><span class="label">Trình duyệt</span><span class="value" id="browser">...</span></div>
        <div class="info-item"><span class="label">Màn hình</span><span class="value" id="screen">...</span></div>
        <div class="info-item"><span class="label">Ngôn ngữ</span><span class="value" id="lang">...</span></div>
    </div>
    
    <div id="map"></div>

    <div class="btn-box">
        <button id="hide-btn" class="btn" onclick="secureSystem()">KÍCH HOẠT ẨN DANH (USA)</button>
        <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ NGAY</a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker;
    // Khởi tạo bản đồ style "Radar"
    map = L.map('map', { zoomControl: false }).setView([10.7, 106.6], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function getOS() {
        let platform = navigator.platform;
        if (platform.includes('Win')) return 'Windows';
        if (platform.includes('Mac')) return 'MacOS';
        if (platform.includes('Linux')) return 'Linux';
        if (/Android/.test(navigator.userAgent)) return 'Android';
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) return 'iOS';
        return 'Unknown';
    }

    function getBrowser() {
        let ua = navigator.userAgent;
        if (ua.includes('Chrome')) return 'Google Chrome';
        if (ua.includes('Firefox')) return 'Mozilla Firefox';
        if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
        return 'Web Browser';
    }

    async function init() {
        // Điền thông tin thiết bị có sẵn
        document.getElementById('os').innerText = getOS();
        document.getElementById('browser').innerText = getBrowser();
        document.getElementById('screen').innerText = window.screen.width + "x" + window.screen.height;
        document.getElementById('lang').innerText = navigator.language.toUpperCase();

        try {
            const res = await fetch('https://ipwho.is/');
            const data = await res.json();
            
            if(data.success) {
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('isp').innerText = data.connection.isp;
                document.getElementById('city').innerText = data.city;
                document.getElementById('country').innerText = data.country;
                updateMap(data.latitude, data.longitude, "TARGET LOCATED");
            } else { throw new Error(); }
        } catch (e) {
            document.getElementById('ip').innerText = "113.161.x.x";
            document.getElementById('isp').innerText = "Viettel Telecom";
            document.getElementById('city').innerText = "Ho Chi Minh City";
            document.getElementById('country').innerText = "Vietnam";
            updateMap(10.762, 106.660, "OFFLINE MODE");
        }
    }

    function updateMap(lat, lon, label) {
        map.flyTo([lat, lon], 14);
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
    }

    function secureSystem() {
        const btn = document.getElementById('hide-btn');
        const container = document.getElementById('container');
        container.style.boxShadow = "0 0 50px #ff0055";
        btn.innerText = "ENCRYPTING DATA...";

        setTimeout(() => {
            document.getElementById('ip').innerText = "104.28.13.11";
            document.getElementById('isp').innerText = "Cloudflare Proxy";
            document.getElementById('city').innerText = "Los Angeles";
            document.getElementById('country').innerText = "United States";
            updateMap(34.0522, -118.2437, "CONNECTION SECURED (USA)");

            btn.style.display = 'none';
            document.getElementById('reg-btn').style.display = 'block';
            container.style.boxShadow = "0 0 50px #00ff88";
        }, 2000);
    }
    init();
</script>
</body>
</html>
