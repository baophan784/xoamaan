<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Phân Tích Bảo Mật</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00f2ff; --bg: #050a14; --card: #101827; --accent: #ff0055; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Courier New', monospace; 
            background: var(--bg); color: #e5e7eb; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 10px;
        }

        #container { 
            background: var(--card); width: 100%; max-width: 500px; 
            padding: 20px; border-radius: 15px; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        h2 { color: var(--primary); margin: 0 0 15px 0; font-size: 1.1rem; text-transform: uppercase; text-align: center; letter-spacing: 2px; }

        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .info-item { background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 6px; border: 1px solid #1f2937; }
        .label { display: block; font-size: 9px; color: #9ca3af; text-transform: uppercase; margin-bottom: 2px; }
        .value { display: block; font-size: 12px; color: var(--primary); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #map { height: 220px; width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid #1f2937; z-index: 1; filter: brightness(0.8) contrast(1.2); }

        .btn-wrapper { min-height: 55px; }
        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 10px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; 
            transition: 0.3s; font-size: 14px; text-decoration: none; display: block; text-align: center;
        }

        #hide-btn { background: var(--primary); color: #050a14; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        #reg-btn { 
            background: linear-gradient(90deg, #ff0055, #ff8800); color: white; 
            display: none; animation: pulse 1.5s infinite; 
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.5);
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .loading { filter: blur(8px) brightness(0.4); pointer-events: none; }
    </style>
</head>
<body>

<div id="container">
    <h2>Security Analysis</h2>
    
    <div class="grid-info">
        <div class="info-item"><span class="label">Địa chỉ IP</span><span class="value" id="ip">Scanning...</span></div>
        <div class="info-item"><span class="label">Nhà mạng</span><span class="value" id="isp">...</span></div>
        <div class="info-item"><span class="label">Vị trí</span><span class="value" id="loc">...</span></div>
        <div class="info-item"><span class="label">Hệ điều hành</span><span class="value" id="os">...</span></div>
        <div class="info-item"><span class="label">Trình duyệt</span><span class="value" id="br">...</span></div>
        <div class="info-item"><span class="label">Màn hình</span><span class="value" id="sr">...</span></div>
    </div>
    
    <div id="map"></div>

    <div class="btn-wrapper">
        <button id="hide-btn" class="btn" onclick="secureNow()">ẨN THÔNG TIN & FAKE USA</button>
        <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ</a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker;
    // Khởi tạo bản đồ mặc định
    map = L.map('map', { zoomControl: false }).setView([10.7, 106.6], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function getHardwareInfo() {
        const ua = navigator.userAgent;
        let os = "Unknown OS";
        if (ua.indexOf("Win") != -1) os = "Windows";
        if (ua.indexOf("Mac") != -1) os = "MacOS";
        if (ua.indexOf("Android") != -1) os = "Android";
        if (ua.indexOf("like Mac") != -1) os = "iOS";
        
        document.getElementById('os').innerText = os;
        document.getElementById('br').innerText = ua.includes("Chrome") ? "Chrome" : (ua.includes("Safari") ? "Safari" : "Browser");
        document.getElementById('sr').innerText = window.screen.width + "x" + window.screen.height;
    }

    async function init() {
        getHardwareInfo();

        // Ưu tiên 1: Lấy tọa độ thực tế từ GPS Trình duyệt (Chính xác nhất)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    updateMap(pos.coords.latitude, pos.coords.longitude, "Vị trí thực tế (GPS)");
                    fetchNetworkInfo(false); // Vẫn lấy IP nhưng không đè vị trí GPS
                },
                () => { fetchNetworkInfo(true); } // Nếu từ chối GPS -> Dùng IP định vị
            );
        } else {
            fetchNetworkInfo(true);
        }
    }

    async function fetchNetworkInfo(updatePos) {
        try {
            const res = await fetch('https://ipwho.is/');
            const data = await res.json();
            
            if(data.success) {
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('isp').innerText = data.connection.isp;
                document.getElementById('loc').innerText = data.city + ", " + data.country_code;
                
                if(updatePos) {
                    updateMap(data.latitude, data.longitude, "Vị trí ước tính (IP)");
                }
            }
        } catch (e) {
            document.getElementById('ip').innerText = "113.161.x.x";
            document.getElementById('isp').innerText = "Viettel Telecom";
            document.getElementById('loc').innerText = "Vietnam";
        }
    }

    function updateMap(lat, lon, label) {
        map.flyTo([lat, lon], 14);
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
    }

    function secureNow() {
        document.getElementById('map').classList.add('loading');
        const btn = document.getElementById('hide-btn');
        btn.innerText = "ENCRYPTING...";

        setTimeout(() => {
            document.getElementById('map').classList.remove('loading');
            document.getElementById('ip').innerText = "104.28.13.11";
            document.getElementById('isp').innerText = "Cloudflare Proxy";
            document.getElementById('loc').innerText = "Los Angeles, US";
            updateMap(34.0522, -118.2437, "CONNECTION SECURED (USA)");

            btn.style.display = 'none';
            document.getElementById('reg-btn').style.display = 'block';
        }, 2000);
    }
    init();
</script>
</body>
</html>
