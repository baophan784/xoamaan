<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Xác Thực Kết Nối</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>

        :root { --primary: #0ea5e9; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        #container { background: var(--card); width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        h2 { color: var(--primary); margin: 0 0 20px 0; font-size: 20px; text-transform: uppercase; }

        .info-box { background: rgba(15, 23, 42, 0.5); padding: 12px; border-radius: 10px; margin-bottom: 8px; text-align: left; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; font-size: 14px; }

        .info-label { color: #94a3b8; }

        .info-value { color: #38bdf8; font-family: monospace; font-weight: bold; }

        #map { height: 250px; width: 100%; border-radius: 12px; margin: 15px 0; border: 1px solid #334155; }

        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; text-decoration: none; transition: 0.3s; text-align: center; font-size: 15px; }

        #hide-btn { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3); }

        #reg-btn { background: linear-gradient(90deg, #f43f5e, #e11d48); color: white; display: none; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .loading { filter: blur(4px); opacity: 0.6; pointer-events: none; }

    </style>

</head>

<body>



    <div id="container">

        <h2>Kiểm tra an ninh</h2>

        <div class="info-box"><span class="info-label">ĐỊA CHỈ IP:</span> <span class="info-value" id="ip">Đang quét...</span></div>

        <div class="info-box"><span class="info-label">VỊ TRÍ:</span> <span class="info-value" id="loc">Đang tìm...</span></div>

        <div id="map"></div>

        <div style="min-height: 50px;">

            <button id="hide-btn" class="btn" onclick="fakeUSA()">ẨN THÔNG TIN IP</button>

            <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ</a>

        </div>

    </div>



    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        let map, marker;

        // Khởi tạo bản đồ mặc định tại Việt Nam

        map = L.map('map', { zoomControl: false }).setView([10.7626, 106.6602], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);



        async function init() {

            // 1. Lấy IP từ Cloudflare (Cực kỳ ổn định, không bị 403)

            try {

                const response = await fetch('https://www.cloudflare.com/cdn-cgi/trace');

                const data = await response.text();

                const ip = data.match(/ip=(.*)\n/)[1];

                document.getElementById('ip').innerText = ip;

            } catch (e) { document.getElementById('ip').innerText = "113.161.x.x"; }



            // 2. Lấy vị trí: Ưu tiên GPS trình duyệt -> Dự phòng IP

            if (navigator.geolocation) {

                navigator.geolocation.getCurrentPosition(

                    (pos) => { // Thành công GPS

                        document.getElementById('loc').innerText = "Việt Nam (Chính xác)";

                        updateMap(pos.coords.latitude, pos.coords.longitude, "Vị trí thực tế");

                    },

                    () => { fallbackLocation(); } // Từ chối GPS hoặc lỗi

                );

            } else { fallbackLocation(); }

        }



        async function fallbackLocation() {

            try {

                // Dùng API dự phòng có HTTPS

                const res = await fetch('https://ipapi.co/json/');

                const data = await res.json();

                if(data.country_name) {

                    document.getElementById('loc').innerText = data.city + ", " + data.country_name;

                    updateMap(data.latitude, data.longitude, "Vị trí ước tính");

                } else { throw new Error(); }

            } catch (e) {

                // NẾU TẤT CẢ ĐỀU LỖI -> ÉP VỀ TP.HCM

                document.getElementById('loc').innerText = "TP. Hồ Chí Minh, Việt Nam";

                updateMap(10.7626, 106.6602, "Vị trí mặc định");

            }

        }



        function updateMap(lat, lon, label) {

            map.flyTo([lat, lon], 14, { duration: 1.5 });

            if (marker) map.removeLayer(marker);

            marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();

        }



        function fakeUSA() {

            document.getElementById('map').classList.add('loading');

            document.getElementById('hide-btn').innerText = "ĐANG MÃ HÓA...";

            

            setTimeout(() => {

                document.getElementById('map').classList.remove('loading');

                document.getElementById('ip').innerText = "104.28.13.11 (Hoa Kỳ)";

                document.getElementById('loc').innerText = "Los Angeles, USA";

                updateMap(34.0522, -118.2437, "Vị trí bảo mật (USA)");

                document.getElementById('hide-btn').style.display = 'none';

                document.getElementById('reg-btn').style.display = 'block';

            }, 2000);

        }

        init();

    </script>

</body>

</html>
