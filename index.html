<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Kiểm Tra Bảo Mật</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00f2ff; --bg: #050a14; --card: #101827; --text: #e5e7eb; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 10px;
        }

        #container { 
            background: var(--card); width: 100%; max-width: 450px; 
            padding: 20px; border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        h2 { color: var(--primary); margin: 0 0 15px 0; font-size: 1.2rem; text-transform: uppercase; text-align: center; letter-spacing: 2px; }

        /* Lưới thông tin chi tiết */
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .info-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border-bottom: 2px solid #1f2937; }
        .label { display: block; font-size: 10px; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; }
        .value { display: block; font-size: 13px; color: var(--primary); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #map { height: 220px; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #1f2937; z-index: 1; }

        .btn-wrapper { min-height: 55px; position: relative; }
        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; 
            transition: 0.3s; font-size: 14px; text-decoration: none; display: block; text-align: center;
        }

        #hide-btn { background: var(--primary); color: #050a14; }
        #reg-btn { 
            background: linear-gradient(90deg, #ff0055, #ff5500); color: white; 
            display: none; animation: pulse 1.5s infinite; 
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .loading { filter: blur(5px) brightness(0.5); pointer-events: none; }
    </style>
</head>
<body>

<div id="container">
    <h2>Trạng Thái Kết Nối</h2>
    
    <div class="grid-info">
        <div class="info-item"><span class="label">Địa chỉ IP</span><span class="value" id="ip">...</span></div>
        <div class="info-item"><span class="label">Nhà mạng</span><span class="value" id="isp">Đang quét</span></div>
        <div class="info-item"><span class="label">Vị trí</span><span class="value" id="loc">...</span></div>
        <div class="info-item"><span class="label">Múi giờ</span><span class="value" id="tz">...</span></div>
    </div>
    
    <div id="map"></div>

    <div class="btn-wrapper">
        <button id="hide-btn" class="btn" onclick="secureNow()">ẨN THÔNG TIN IP</button>
        <a href="https://www.fly88d.vip/?id=631094996" id="reg-btn" class="btn">TIẾN HÀNH ĐĂNG KÝ</a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker;
    map = L.map('map', { zoomControl: false }).setView([10.7, 106.6], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function init() {
        try {
            // Sử dụng API ipwho.is rất chi tiết và hỗ trợ HTTPS
            const res = await fetch('https://ipwho.is/');
            const data = await res.json();
            
            if(data.success) {
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('isp').innerText = data.connection.isp;
                document.getElementById('loc').innerText = data.city;
                document.getElementById('tz').innerText = data.timezone.id;
                updateMap(data.latitude, data.longitude, "Vị trí thực tế");
            } else { throw new Error(); }
        } catch (e) {
            // Dự phòng khi lỗi
            document.getElementById('ip').innerText = "113.161.x.x";
            document.getElementById('isp').innerText = "Viettel Telecom";
            document.getElementById('loc').innerText = "Việt Nam";
            document.getElementById('tz').innerText = "Asia/Ho_Chi_Minh";
            updateMap(10.762, 106.660, "Vị trí dự phòng");
        }
    }

    function updateMap(lat, lon, label) {
        map.flyTo([lat, lon], 14);
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
    }

    function secureNow() {
        const btn = document.getElementById('hide-btn');
        document.getElementById('map').classList.add('loading');
        btn.innerText = "ĐANG MÃ HÓA...";

        setTimeout(() => {
            document.getElementById('map').classList.remove('loading');
            document.getElementById('ip').innerText = "104.28.13.11";
            document.getElementById('isp').innerText = "Cloudflare Inc.";
            document.getElementById('loc').innerText = "Los Angeles, US";
            document.getElementById('tz').innerText = "America/Los_Angeles";
            updateMap(34.0522, -118.2437, "Đã bảo mật (USA)");

            btn.style.display = 'none';
            document.getElementById('reg-btn').style.display = 'block';
        }, 2000);
    }
    init();
</script>
</body>
</html>
